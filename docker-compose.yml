services:
  web:
    build: .
    container_name: csrp_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0  # Add this
    depends_on:
      - redis
    restart: unless-stopped

  celery:
    build: .
    container_name: csrp_celery
    command: celery -A csrp_project worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0  # Add this
    depends_on:
      - redis
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: csrp_celery_beat
    command: celery -A csrp_project beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0  # Add this
    depends_on:
      - redis
      - web
    restart: unless-stopped
